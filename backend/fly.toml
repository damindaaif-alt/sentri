app = "sentri-api"
primary_region = "syd"   # Sydney — closest to NZ

[build]

[env]
  PORT = "3000"

[mounts]
  source = "sentri_data"
  destination = "/data"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout  = "5s"
    path     = "/health"
