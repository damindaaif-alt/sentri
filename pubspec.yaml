name: sentri
description: Sentri — Privacy-first AI-powered call blocking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^8.0.0
  injectable: ^2.4.4

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Call functionality
  call_log: ^5.0.1
  phone_state: ^2.1.0
  flutter_callkit_incoming: ^2.0.4

  # On-device ML (vishing detection — opt-in)
  tflite_flutter: ^0.10.4

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.4.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  drift_dev: ^2.18.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
    - assets/lottie/
